- type: entity

  # Muszę zrobić poprawny prototyp do tłumaczenia kiedyś
  id: WeaponVisMPSPistolMagazineBase
  name: Magazynek VIS MPS (.35 auto any)
  parent: [ BaseItem, BaseSecurityContraband]
  components:
    - type: Tag
      tags:
        - WeaponVisMPSPistolMagazine
    - type: BallisticAmmoProvider
      mayTransfer: true
      whitelist:
        tags:
          - CartridgePistol
      capacity: 16
    - type: Item
      size: Small
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
    - type: Sprite
      sprite: _Polonium/Weapons/Guns/Magazines/VIS_MPS_Mag.rsi
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
    - type: MagazineVisuals
      magState: mag
      steps: 6
      zeroVisible: false
    - type: Appearance


# Pierdyłiard wersji tego magazyneku

- type: entity
  id: WeaponVisMPSPistolMagazine
