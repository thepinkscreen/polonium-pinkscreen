- type: entity

  # Muszę zrobić poprawny prototyp do tłumaczenia kiedyś
  id: BorSniperMagazineBase
  name: Magazynek Alexis-BOR (.50 AE any)
  parent: [ BaseItem, BaseSecurityContraband]
  components:
    - type: Tag
      tags:
        - BorSniperMagazine
    - type: BallisticAmmoProvider
      mayTransfer: true
      whitelist:
        tags:
          - CartridgePistolLarge
      capacity: 5
    - type: Item
      size: Small
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
    - type: Sprite
      sprite: _Polonium/Weapons/Guns/Magazines/BOR_Mag.rsi
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
    - type: MagazineVisuals
      magState: mag
      steps: 2
      zeroVisible: false
    - type: Appearance

- type: entity
  id: BorSniperMagazine
  name: Magazynek Alexis-BOR (.50 AE)
  parent: BorSniperMagazineBase
  components:
    - type: BallisticAmmoProvider
      proto: CartridgePistolLarge

- type: entity
  id: BorSniperMagazineEmpty
  parent: BorSniperMagazineBase
  name: Magazynek Alexis-BOR (.50 AE any)
  suffix: (pusty)
  components:
    - type: BallisticAmmoProvider
      proto: null

- type: entity
  id: BorSniperMagazinePractice
  name: Magazynek Alexis-BOR (.50 AE ślepaki)
  parent: BorSniperMagazineBase
  components:
    - type: BallisticAmmoProvider
      proto: CartridgePistolLargePractice

- type: entity
  id: BorSniperMagazineIncendiary
  name: Magazynek Alexis-BOR (.50 AE samozapalające)
  parent: BorSniperMagazineBase
  components:
    - type: BallisticAmmoProvider
      proto: CartridgePistolLargeIncendiary

- type: entity
  id: BorSniperMagazineUranium
  name: Magazynek Alexis-BOR (.50 AE uranowe)
  parent: BorSniperMagazineBase
  components:
    - type: BallisticAmmoProvider
      proto: CartridgePistolLargeUranium
