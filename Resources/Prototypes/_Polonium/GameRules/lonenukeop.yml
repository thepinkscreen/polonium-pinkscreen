- type: entity
  parent: BaseNukeopsRule
  id: LoneNukeopsRoundStart
  categories: [ HideSpawnMenu ]
  components:
  - type: GameRule
    minPlayers: 15
    chaosScore: 500
  - type: LoadMapRule
    gridPath: /Maps/Shuttles/ShuttleEvent/striker.yml
  - type: NukeopsRule
    roundEndBehavior: Nothing
    warDeclarationMinOps: 1
    canEnableWarOps: true
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ Nukeops ]
      fallbackRoles: [ Nukeops ]
      spawnerPrototype: SpawnPointLoneNukeOperative
      min: 1
      max: 1
      startingGear: SyndicateLoneOperativeGearFullRoundStart
      roleLoadout:
      - RoleSurvivalNukie
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesNukieFirstOperator
        - NamesSyndicateElite
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeops
  - type: Tag
    tags:
    - RoundstartAntag
