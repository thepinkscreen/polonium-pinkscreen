# midround event table - change BasicGameRulesTable if you want to add more midround event types
# if you want to add more midround event types to secret+ specifically, make a new table and add it as a new entry here
# if you want to make your own gamemode with its own gamerules, make a new table with entries of your choice
- type: entityTable
  id: SecretPlusTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - !type:NestedSelector
      tableId: SpaceTrafficControlTable
    - !type:NestedSelector
      tableId: BasicGameRulesTable

# repeatedly rolled after the primary until we eat up all our chaos, if the primary wasn't enough
- type: weightedRandom
  id: SecretPlus
  weights:
    # subgamemodes
    ThiefSecretPlus: 0.10
    # Shadowling: 0.02
    # normal
    Traitor: 0.1
    CalmTraitor: 0.15
    CalmLing: 0.05
    Changeling: 0.05
    CalmHeretic: 0.08
    lowZombies: 0.008
    medZombies: 0.008
    BlobGameMode: 0.05
    MalfAi: 0.05
    # CorporateAgent: 0.025
    # XenomorphsInfestationRoundstart: 0.02

# important note: those (and especially the above) weights aren't entirely accurate,
# as secret+ can randomly decide it's not going to use this gamerule
# if it doesn't entirely fit into its remaining budget,
# so if we rolled 450 budget and a rule takes 1000, we effectively rolled 900 (doubled for reroll consideration for primary gamerule only),
# which is not enough so we have a 10% chance to skip it
# however the amount of effective budget used is reduced for primary rule so this only matters on low/midpop
- type: weightedRandom
  id: SecretPlusPrimary
  weights:
    Traitor: 0.25
    CalmLing: 0.07
    Changeling: 0.07
    CalmHeretic: 0.08
    Nukeops: 0.05
    LoneNukeopsRoundStart: 0.03
    Revolutionary: 0.05
    BlobGameMode: 0.05
    Wizard: 0.025
    CosmicCult: 0.05
    BloodCult: 0.05
    MalfAi: 0.05
    ThiefSecretPlus: 0.06
    # CorporateAgent: 0.025
    # XenomorphsInfestationRoundstart: 0.02
    # OopsAllThieves: 0.02

# all roundstart antags
- type: weightedRandom
  id: SecretPlusChaos
  weights:
    ThiefSecretPlus: 0.10
    # Shadowling: 0.09
    Traitor: 0.25
    Changeling: 0.10
    CalmHeretic: 0.11
    Nukeops: 0.05
    Revolutionary: 0.05
    Zombie: 0.04
    BlobGameMode: 0.05
    Wizard: 0.025
    CosmicCult: 0.05
    BloodCult: 0.05
    MalfAi: 0.05
    # CorporateAgent: 0.025
    # XenomorphsInfestationRoundstart: 0.02⠀⠀⠀⠀

# Roundstart antag weights - Mid/MidHigh primary, zombies/blob/malf in SecretPlus secondary.
- type: weightedRandom
  id: SecretPlusPrimaryMid
  weights:
    Traitor: 0.25
    CalmLing: 0.07
    Changeling: 0.07
    CalmHeretic: 0.08
    Nukeops: 0.05
    LoneNukeopsRoundStart: 0.03
    Revolutionary: 0.05
    Wizard: 0.025
    CosmicCult: 0.05
    BloodCult: 0.05

- type: weightedRandom
  id: SecretPlusPrimaryMidHigh
  weights:
    Traitor: 0.25
    CalmLing: 0.07
    Changeling: 0.07
    CalmHeretic: 0.08
    Nukeops: 0.05
    LoneNukeopsRoundStart: 0.03
    Revolutionary: 0.05
    Wizard: 0.025
    CosmicCult: 0.05
    BloodCult: 0.05

- type: entityTable
  id: SecretPlusMidTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: SpaceTrafficControlTable
    - !type:NestedSelector
      tableId: BasicGameRulesTable
    - id: ReplicatorSpawnSecretPlus

- type: entityTable
  id: SecretPlusMidHighTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: SpaceTrafficControlTable
    - !type:NestedSelector
      tableId: BasicGameRulesTable
    - id: ReplicatorSpawnSecretPlus
    - id: GreytideVirusSecretPlus

- type: entityTable
  id: SecretPlusSurvivalTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: SpaceTrafficControlTable
    - !type:NestedSelector
      tableId: BasicGameRulesTable
    - id: ZombieOutbreakSurvivalPlus

# middle setting: supposed to be a "normal round" baseline setting
- type: entity
  id: SecretPlusMid
  parent: BaseGameRule
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    # if you've come here due to "too many antags", lower chaos change for less midrounds and lower starting chaos for less roundstarts
    minStartingChaos: 22 # scales per player
    maxStartingChaos: 33
    livingChaosChange: -0.018
    deadChaosChange: 0.020
    # chance for greenshift as well as evilshift
    chaosChangeVariationMin: 0.8
    chaosChangeVariationMax: 1.3
    # often fires chud events so relatively low
    eventIntervalMin: 90
    eventIntervalMax: 400
    disallowedEvents: [ FriendlySpawn ]
    primaryAntagsWeightTable: SecretPlusPrimaryMid
  - type: SelectedGameRules
    scheduledGameRules: !type:NestedSelector
      tableId: SecretPlusMidTable

- type: entity
  id: SecretPlusMidHigh
  parent: SecretPlusMid
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    minStartingChaos: 33
    maxStartingChaos: 44
    livingChaosChange: -0.028
    deadChaosChange: 0.030
    chaosChangeVariationMin: 0.8
    primaryAntagsWeightTable: SecretPlusPrimaryMidHigh
  - type: SelectedGameRules
    scheduledGameRules: !type:NestedSelector
      tableId: SecretPlusMidHighTable

# the Setting that Kills You
- type: entity
  id: SecretPlusAdmeme
  parent: SecretPlusMid
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    minStartingChaos: 45
    maxStartingChaos: 60 # ling-blob-nukeops is fun
    livingChaosChange: -0.03
    deadChaosChange: 0.03
    chaosExponent: 1
    eventIntervalMin: 60
    eventIntervalMax: 200 # hell
    primaryAntagsWeightTable: SecretPlusChaos
    ignoreIncompatible: true
    ignoreTimings: true # would run out of events otherwise

# greenshift setting
- type: entity
  id: SecretPlusLow
  parent: SecretPlusMid
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    minStartingChaos: 5
    maxStartingChaos: 10
    noRoundstartAntags: true
    livingChaosChange: -0.006
    deadChaosChange: 0.015
    chaosExponent: 1.2
    eventIntervalMin: 150
    eventIntervalMax: 480

# survival+
# "baseline" ramping setting
- type: entity
  id: SecretPlusRampingMid
  parent: SecretPlusMid
  categories: [ HideSpawnMenu ]
  components:
  - type: SecretPlus
    minStartingChaos: 0
    maxStartingChaos: 0
    noRoundstartAntags: true
    speedRamping: 0.0003 # ramps to 2x in about an hour, to 3x in ~2
  - type: SelectedGameRules
    scheduledGameRules: !type:NestedSelector
      tableId: SecretPlusSurvivalTable
