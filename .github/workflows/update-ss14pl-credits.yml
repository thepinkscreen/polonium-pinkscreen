name: Add contributor to credits

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  add-contributor:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add contributor to credits
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          FILE="Resources/Credits/SS14PL.txt"
          touch "$FILE"

          NAMES=$(tr -d '\r\n' < "$FILE")

          FOUND=false
          IFS=',' read -ra ENTRIES <<< "$NAMES"
          for entry in "${ENTRIES[@]}"; do
            if [ "$entry" = "$AUTHOR" ]; then
              FOUND=true
              break
            fi
          done

          if [ "$FOUND" = true ]; then
            echo "Author '$AUTHOR' already in credits."
            exit 0
          fi

          if [ -z "$NAMES" ]; then
            printf '%s\n' "$AUTHOR" > "$FILE"
          else
            printf '%s\n' "$NAMES,$AUTHOR" > "$FILE"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Resources/Credits/SS14PL.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: add ${{ github.event.pull_request.user.login }} to credits"
          git push
